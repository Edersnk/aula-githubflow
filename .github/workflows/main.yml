name: Primeira-pipeline
on:
  push:
    branches: ["main"]
  workflow_dispatch:
jobs:
  primeiro-job:
    name: "Meu primeiro job"
    runs-on: ubuntu-latest
    steps:
      - name: "Minha primeira acao"
        run: echo "Hello world !!!"
      - name: "Segunda acao"
        run: |
          echo "Voce criou o seu primeiro workflow"
          echo "Parabens"  
  segundo-job:
    name: "Segundo job"
    runs-on: ubuntu-latest
    needs: primeiro-job
    steps:
      - name: "Verificando versao NodeJS"
        run: node --version
      - name: "Atualizando para versao mais atuao do NodeJS"
        uses: actions/setup-node@v6
        with: 
          node-version: '24.14.1'
      - name: "Verificando versao do NodeJS apos atualizar"
        run: node --version
          
